<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Respect du tri – NOK (J-1)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    padding: 20px;
  }

  #header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  #title-label {
    font-size: 15px;
    color: #333;
    font-weight: 600;
  }

  #count {
    font-size: 12px;
    color: #888;
    margin-left: auto;
  }

  /* Carte par ligne (photo + commentaire) */
  .card {
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #e0e4ea;
    margin-bottom: 16px;
    display: flex;
    flex-wrap: wrap;
  }

  .card-photo {
    flex: 0 0 220px;
    cursor: pointer;
    position: relative;
    background: #f5f5f5;
  }

  .card-photo img {
    width: 100%;
    height: 100%;
    min-height: 160px;
    object-fit: cover;
    display: block;
  }

  .card-photo .photo-count {
    position: absolute;
    bottom: 6px;
    right: 6px;
    background: rgba(0,0,0,.6);
    color: #fff;
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 10px;
  }

  .card-photo.no-photo {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #bbb;
    font-size: 12px;
    min-height: 160px;
  }

  .card-body {
    flex: 1;
    min-width: 220px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    align-self: flex-start;
    background: #fde8e8;
    color: #c0392b;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 10px;
  }

  .card-comment-label {
    font-size: 11px;
    color: #999;
    text-transform: uppercase;
    letter-spacing: .03em;
    margin-top: 4px;
  }

  .card-comment {
    font-size: 13px;
    color: #444;
    line-height: 1.4;
  }

  .card-comment.empty {
    color: #aaa;
    font-style: italic;
  }

  /* État vide / erreur / chargement */
  #state {
    text-align: center;
    color: #888;
    font-size: 14px;
    padding: 60px 20px;
    display: none;
  }

  #state.visible { display: block; }

  #spinner {
    width: 36px; height: 36px;
    border: 3px solid #dde1e7;
    border-top-color: #4a6cf7;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto 14px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Lightbox */
  #lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.85);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    padding: 20px;
  }

  #lightbox.open { display: flex; }

  #lb-img {
    max-width: 90vw;
    max-height: 80vh;
    border-radius: 6px;
    object-fit: contain;
    box-shadow: 0 8px 40px rgba(0,0,0,.5);
  }

  #lb-name {
    color: #ccc;
    font-size: 13px;
  }

  #lb-close {
    position: fixed;
    top: 16px; right: 20px;
    color: #fff;
    font-size: 28px;
    cursor: pointer;
    line-height: 1;
    background: none;
    border: none;
    opacity: .8;
  }

  #lb-close:hover { opacity: 1; }

  #lb-nav {
    display: flex;
    gap: 16px;
  }

  #lb-nav button {
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.3);
    color: #fff;
    border-radius: 6px;
    padding: 8px 20px;
    cursor: pointer;
    font-size: 20px;
    transition: background .15s;
  }

  #lb-nav button:hover { background: rgba(255,255,255,.25); }
  #lb-nav button:disabled { opacity: .3; cursor: default; }
</style>
</head>
<body>

<div id="header">
  <span id="title-label">🗑️ Respect du tri – Non conformités (J-1)</span>
  <span id="count"></span>
</div>

<div id="state">
  <div id="spinner"></div>
  <div id="state-msg">Chargement…</div>
</div>

<div id="cards"></div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close" onclick="closeLightbox()">✕</button>
  <img id="lb-img" src="" alt="">
  <div id="lb-name"></div>
  <div id="lb-nav">
    <button id="lb-prev" onclick="navLightbox(-1)">‹</button>
    <button id="lb-next" onclick="navLightbox(1)">›</button>
  </div>
</div>

<script>
  const API_BASE = 'https://table.pingflow.io/api';
  const TOKEN    = 'S4yQFAoFdI9ufd8vZVhGecSOzQYRLiKa';

  const TABLE_ID = '465735'; // Tour de terrain

  const FIELD_TRI         = 'respect_du_tri';
  const FIELD_PHOTO       = 'respect_du_tri_photo';
  const FIELD_COMMENTAIRE = 'respect_du_tri_commentaire';
  const FIELD_TEMPORALITE = 'Temporalités';

  const VALEUR_TRI  = 'NOK';
  const VALEUR_TEMP = 'J-1';

  let images = [];   // liste plate de toutes les images (toutes lignes confondues) pour le lightbox
  let lbIndex = 0;

  const stateEl  = document.getElementById('state');
  const stateMsg = document.getElementById('state-msg');
  const cardsEl  = document.getElementById('cards');
  const countEl  = document.getElementById('count');

  function showState(msg, keepSpinner = false) {
    stateEl.classList.add('visible');
    stateMsg.textContent = msg;
    document.getElementById('spinner').style.display = keepSpinner ? 'block' : 'none';
  }

  function hideState() {
    stateEl.classList.remove('visible');
    document.getElementById('spinner').style.display = 'block';
  }

  function isImage(mime) {
    return mime && mime.startsWith('image/');
  }

  function cleanName(f) {
    return f.visible_name || f.name || 'fichier';
  }

  async function loadRows() {
    showState('Chargement…', true);

    try {
      // Pas de filtre serveur ici : "respect_du_tri" est une liste déroulante (l'API attend
      // l'ID de l'option, pas le texte) et "Temporalités" est une formule (type de retour variable).
      // On récupère donc toutes les lignes et on filtre nous-mêmes en JavaScript.
      let allRows = [];
      let url = `${API_BASE}/database/rows/table/${TABLE_ID}/?user_field_names=true&size=200`;

      while (url) {
        const res = await fetch(url, { headers: { Authorization: `Token ${TOKEN}` } });

        if (!res.ok) {
          showState(`Erreur ${res.status} lors de la récupération des données.`);
          return;
        }

        const data = await res.json();
        allRows = allRows.concat(data.results || []);
        url = data.next; // pagination : Baserow renvoie l'URL de la page suivante, ou null
      }

      // Debug : ouvre la console (F12) pour voir le format exact des champs si besoin
      if (allRows.length) {
        console.log('Exemple de ligne brute :', allRows[0]);
        console.log('Valeur du champ tri :', allRows[0][FIELD_TRI]);
        console.log('Valeur du champ temporalité :', allRows[0][FIELD_TEMPORALITE]);
      }

      // Filtrage : respect_du_tri = NOK ET Temporalités = J-1
      // Avec user_field_names=true, un champ "liste déroulante" (single select) renvoie un
      // objet { id, value, color } -> il faut comparer sur .value, pas sur l'objet entier.
      // Un champ formule renvoie directement le texte calculé.
      const rows = allRows.filter(r => {
        const tri = r[FIELD_TRI];
        const triValeur = (tri && typeof tri === 'object') ? tri.value : tri;
        const temp = r[FIELD_TEMPORALITE];
        const tempValeur = (temp && typeof temp === 'object') ? temp.value : temp;

        return String(triValeur ?? '').trim().toUpperCase() === VALEUR_TRI
            && String(tempValeur ?? '').trim() === VALEUR_TEMP;
      });

      hideState();

      if (!rows.length) {
        showState('Aucune non-conformité "tri" en J-1 pour le moment. 👍');
        return;
      }

      renderCards(rows);

    } catch (e) {
      showState('Erreur de connexion à l\'API Baserow.');
      console.error(e);
    }
  }

  function renderCards(rows) {
    images = [];
    let totalPhotos = 0;

    rows.forEach(row => {
      const fichiers = (row[FIELD_PHOTO] || []).filter(f => isImage(f.mime_type));
      const commentaire = (row[FIELD_COMMENTAIRE] || '').toString().trim();
      totalPhotos += fichiers.length;

      const card = document.createElement('div');
      card.className = 'card';

      // Zone photo (vignette + compteur si plusieurs photos)
      const photoDiv = document.createElement('div');
      if (fichiers.length) {
        const firstImgGlobalIdx = images.length;
        fichiers.forEach(f => images.push(f));

        photoDiv.className = 'card-photo';
        photoDiv.onclick = () => openLightbox(firstImgGlobalIdx);
        const thumbUrl = fichiers[0].thumbnails?.card_cover?.url || fichiers[0].thumbnails?.large?.url || fichiers[0].url;
        photoDiv.innerHTML = `
          <img src="${thumbUrl}" alt="${cleanName(fichiers[0])}" loading="lazy">
          ${fichiers.length > 1 ? `<span class="photo-count">+${fichiers.length - 1}</span>` : ''}
        `;
      } else {
        photoDiv.className = 'card-photo no-photo';
        photoDiv.textContent = 'Aucune photo';
      }

      // Zone texte (tag + commentaire)
      const bodyDiv = document.createElement('div');
      bodyDiv.className = 'card-body';
      bodyDiv.innerHTML = `
        <span class="card-tag">⚠️ NOK · J-1</span>
        <div class="card-comment-label">Commentaire</div>
        <div class="card-comment ${commentaire ? '' : 'empty'}">${commentaire || 'Aucun commentaire'}</div>
      `;

      card.appendChild(photoDiv);
      card.appendChild(bodyDiv);
      cardsEl.appendChild(card);
    });

    countEl.textContent = `${rows.length} ligne${rows.length > 1 ? 's' : ''} · ${totalPhotos} photo${totalPhotos > 1 ? 's' : ''}`;
  }

  // ── Lightbox ──
  function openLightbox(idx) {
    lbIndex = idx;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }

  function navLightbox(dir) {
    lbIndex = Math.max(0, Math.min(images.length - 1, lbIndex + dir));
    updateLightbox();
  }

  function updateLightbox() {
    const f = images[lbIndex];
    document.getElementById('lb-img').src  = f.url;
    document.getElementById('lb-name').textContent = cleanName(f);
    document.getElementById('lb-prev').disabled = lbIndex === 0;
    document.getElementById('lb-next').disabled = lbIndex === images.length - 1;
  }

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft')  navLightbox(-1);
    if (e.key === 'ArrowRight') navLightbox(1);
  });

  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
  });

  window.addEventListener('error', (e) => {
    showState('Erreur technique : ' + e.message);
  });

  loadRows();
</script>
</body>
</html>
